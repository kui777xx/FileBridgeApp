<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>FileBridge Cloud</title>
    <style>
        body { background: #0b0b1a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .panel { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 20px; border-radius: 15px; width: 500px; }
        .file-card { background: #16213e; padding: 10px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        button { background: #4facfe; border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #000; color: white; }
        .owner-tag { font-size: 10px; color: #4facfe; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="auth" class="panel">
        <h2>Zaloguj się</h2>
        <input type="text" id="u" placeholder="Login">
        <input type="password" id="p" placeholder="Hasło">
        <button onclick="auth('login')">Wejdź</button>
    </div>

    <div id="app" class="panel" style="display:none">
        <h2 id="welcome">Witaj</h2>
        <div style="border: 2px dashed #4facfe; padding: 20px; text-align: center; margin-bottom: 20px;">
            <input type="file" id="fileInput" onchange="uploadFile()">
            <p>Wybierz plik, aby go udostępnić znajomym</p>
        </div>

        <h3>Pliki w Twojej sieci:</h3>
        <div id="file-list"></div>
        
        <hr>
        <input type="text" id="fName" placeholder="Nick znajomego">
        <button onclick="socket.emit('add-friend', document.getElementById('fName').value)">Dodaj znajomego</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let userData = null;

        function auth(type) {
            socket.emit('auth', { type, username: document.getElementById('u').value, password: document.getElementById('p').value });
        }

        socket.on('auth-success', u => {
            userData = u;
            document.getElementById('auth').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('welcome').innerText = "Witaj, " + u.username;
        });

        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            const formData = new FormData();
            formData.append('file', file);
            formData.append('owner', userData.username);
            formData.append('ownerId', userData.id);

            document.getElementById('welcome').innerText = "Wysyłanie...";
            await fetch('/upload', { method: 'POST', body: formData });
            document.getElementById('welcome').innerText = "Witaj, " + userData.username;
        }

        socket.on('update-data', data => {
            const list = document.getElementById('file-list');
            list.innerHTML = "";
            data.files.forEach(f => {
                list.innerHTML += `
                    <div class="file-card">
                        <div>
                            <div class="owner-tag">${f.owner} udostępnił:</div>
                            <strong>${f.name}</strong><br>
                            <small>${(f.size/1024/1024).toFixed(2)} MB</small>
                        </div>
                        <button onclick="window.location='/download/${f._id}'">Pobierz</button>
                    </div>`;
            });
        });
    </script>
</body>
</html>
