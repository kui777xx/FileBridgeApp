<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>FileBridge P2P</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <style>
        .premium-gold { border-color: #ffd700 !important; color: #ffd700 !important; box-shadow: 0 0 20px #ffd700 !important; }
        .file-requests-panel { background: rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 10px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .file-item { background: #1a1a2e; padding: 8px; border-radius: 5px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .btn-ok { background: #28a745; border:none; color:white; padding: 4px 8px; border-radius:3px; cursor:pointer; }
        .btn-no { background: #dc3545; border:none; color:white; padding: 4px 8px; border-radius:3px; cursor:pointer; }
    </style>
</head>
<body>
    <div id="auth-screen" class="glass-panel">
        <h1>FileBridge</h1>
        <input type="text" id="username" placeholder="Login">
        <input type="password" id="password" placeholder="Hasło">
        <button onclick="auth('login')">Zaloguj</button>
        <button onclick="auth('register')" class="secondary">Rejestracja</button>
    </div>

    <div id="main-app" class="app-container" style="display: none;">
        <div class="glass-panel topbar">
            <div id="my-name">Witaj</div>
            <div id="p2p-status">● Offline</div>
        </div>

        <div class="main-hub" id="hub">
            <div id="my-avatar" class="user-node center"><div class="avatar">TY</div></div>
        </div>

        <div class="bottom-panels">
            <div class="glass-panel">
                <h3>Znajomi/Kody</h3>
                <div id="notif-list" style="margin-bottom:10px"></div>
                <input type="text" id="friend-name" placeholder="Szukaj znajomego...">
                <button onclick="socket.emit('add-friend', document.getElementById('friend-name').value)">Dodaj</button>
                <input type="text" id="premium-code" placeholder="Kod premium..." style="margin-top:10px">
                <button onclick="socket.emit('redeem-code', document.getElementById('premium-code').value)" class="secondary">Użyj kodu</button>
            </div>

            <div class="glass-panel">
                <h3>Akceptacja Plików</h3>
                <div id="file-requests-list">Brak próśb</div>
            </div>

            <div class="glass-panel">
                <h3>Transfer</h3>
                <div id="file-info">Upuść plik na awatar znajomego</div>
                <div class="progress-bar-container"><div id="progress-fill" class="progress-bar-fill"></div></div>
                <div id="transfer-stats">0/0 MB</div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let p, myUsername, selectedFile;
        // Serwery STUN od Google pozwalają łączyć się przez internet
        const peerConfig = { config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] } };

        function auth(type) {
            socket.emit('auth', { type, username: document.getElementById('username').value, password: document.getElementById('password').value });
        }

        socket.on('auth-success', u => {
            myUsername = u.username;
            document.getElementById('auth-screen').style.display='none';
            document.getElementById('main-app').style.display='grid';
            document.getElementById('my-name').innerText = u.username;
            if(u.premium === 'gold') document.querySelector('#my-avatar .avatar').classList.add('premium-gold');
        });

        socket.on('friend-list', list => {
            const hub = document.getElementById('hub');
            const nList = document.getElementById('notif-list');
            document.querySelectorAll('.remote-user').forEach(e => e.remove());
            nList.innerHTML = "";
            
            list.forEach((f, i) => {
                if(f.status === 'pending' && f.sender !== myUsername) {
                    nList.innerHTML += `<div>${f.username} <button class="btn-ok" onclick="socket.emit('accept-friend','${f.username}')">Akceptuj</button></div>`;
                } else if(f.status === 'accepted' && f.isOnline) {
                    const node = document.createElement('div');
                    node.className = 'user-node remote-user';
                    node.style.transform = `rotate(${i*60}deg) translate(180px) rotate(-${i*60}deg)`;
                    node.innerHTML = `<div class="avatar ${f.premium === 'gold' ? 'premium-gold' : ''}" onclick="prepareFile('${f.username}')">${f.username[0]}</div><span>${f.username}</span>`;
                    hub.appendChild(node);
                }
            });
        });

        // PRZESYŁANIE
        window.ondragover = e => e.preventDefault();
        window.ondrop = e => { e.preventDefault(); selectedFile = e.dataTransfer.files[0]; document.getElementById('file-info').innerText = "Wybrano: " + selectedFile.name; };

        function prepareFile(target) {
            if(!selectedFile) return alert("Najpierw upuść plik!");
            socket.emit('file-offer', { to: target, fileName: selectedFile.name, fileSize: selectedFile.size });
            document.getElementById('file-info').innerText = "Czekam na akceptację...";
        }

        socket.on('file-request', data => {
            const list = document.getElementById('file-requests-list');
            if(list.innerText.includes("Brak")) list.innerHTML = "";
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `<span>${data.from}: ${data.fileName}</span><div><button class="btn-ok" onclick="acceptFile('${data.from}')">TAK</button></div>`;
            list.appendChild(div);
        });

        function acceptFile(from) {
            socket.emit('file-accepted', { to: from });
            event.target.closest('.file-item').remove();
        }

        socket.on('start-webrtc', data => {
            p = new SimplePeer({ initiator: true, trickle: false, ...peerConfig });
            setupPeer(p, data.from);
        });

        socket.on('signal', data => {
            if(!p) {
                p = new SimplePeer({ initiator: false, trickle: false, ...peerConfig });
                setupPeer(p, data.from);
            }
            p.signal(data.signal);
        });

        function setupPeer(peer, target) {
            peer.on('signal', s => socket.emit('signal', { signal: s, to: target }));
            peer.on('connect', () => {
                if(selectedFile) {
                    peer.send(JSON.stringify({ n: selectedFile.name, s: selectedFile.size }));
                    const reader = new FileReader();
                    let offset = 0;
                    reader.onload = e => {
                        peer.send(e.target.result);
                        offset += e.target.result.byteLength;
                        updateUI(offset, selectedFile.size);
                        if (offset < selectedFile.size) reader.readAsArrayBuffer(selectedFile.slice(offset, offset + 16384));
                    };
                    reader.readAsArrayBuffer(selectedFile.slice(0, 16384));
                }
            });
            let meta = null, chunks = [], rec = 0;
            peer.on('data', d => {
                try { meta = JSON.parse(d); } 
                catch(e) { 
                    chunks.push(d); rec += d.byteLength;
                    updateUI(rec, meta.s);
                    if(rec >= meta.s) {
                        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(chunks));
                        a.download = meta.n; a.click(); location.reload();
                    }
                }
            });
        }

        function updateUI(d, t) {
            const pc = Math.round((d/t)*100);
            document.getElementById('progress-fill').style.width = pc+'%';
            document.getElementById('transfer-stats').innerText = `${(d/1024/1024).toFixed(1)} / ${(t/1024/1024).toFixed(1)} MB`;
        }
    </script>
</body>
</html>
